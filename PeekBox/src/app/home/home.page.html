<ion-content [fullscreen]="true" class="home-content">
  <div class="stage">

    <div class="hm-blobs">
      <div class="hmb-blob hmb-blob--1"></div>
      <div class="hmb-blob hmb-blob--2"></div>
      <div class="hmb-blob hmb-blob--3"></div>
      <div class="hmb-blob hmb-blob--4"></div>
    </div>

    <div class="hm-hamburger-wrap" [class.is-open]="menuAperto">
      <button class="hm-hamburger" (click)="menuAperto = true" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <div class="hm-menu-open">
        <button class="hm-menu-btn hm-menu-close" (click)="menuAperto = false" aria-label="Chiudi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <button class="hm-menu-btn" routerLink="/scan-qr" (click)="menuAperto = false" aria-label="Scansiona QR" title="Scansiona un QR Code per trovare una box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
            <rect x="7" y="7" width="10" height="10" rx="1.5"/>
            <line x1="12" y1="7" x2="12" y2="17"/><line x1="7" y1="12" x2="17" y2="12"/>
          </svg>
        </button>
        <button class="hm-menu-btn" routerLink="/crea-box" (click)="menuAperto = false" aria-label="Aggiungi Box" title="Crea una nuova box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="4"/>
            <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </button>
        <button class="hm-menu-btn" routerLink="/filtri" (click)="menuAperto = false" aria-label="Filtri" title="Filtra le tue box per categoria, spazio o preferiti">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="hm-main">
      <div class="hm-intestazione">
        <h1 class="hm-titolo">Le mie scatole</h1>
      </div>

      <div *ngIf="caricamento" class="hm-caricamento">
        <div class="hm-spinner"></div>
      </div>

      <div *ngIf="!caricamento && boxList.length === 0" class="hm-vuoto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        <p class="hm-vuoto-testo">Nessuna scatola ancora</p>
        <button class="hm-vuoto-btn" routerLink="/crea-box">Crea la tua prima scatola</button>
      </div>

      <div *ngIf="!caricamento && boxList.length > 0" class="hm-grid">
        <div *ngFor="let box of boxVisibili; let i = index"
             class="hm-card"
             [style.animation-delay]="(i * 0.12) + 's'">
          <div class="hm-card-actions">
            <button class="hm-card-act" [class.hm-card-act--fav]="box.is_preferito" (click)="togglePreferito(box, $event)" title="Preferito">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </button>
            <button class="hm-card-act hm-card-act--del" (click)="eliminaBox(box, $event)" title="Elimina">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
          <div class="hm-card-body" (click)="apriDettaglio(box.id)">
            <div class="hm-card-icon">
              <img [src]="iconaBox(box)" [alt]="box.nome" />
            </div>
            <span class="hm-card-nome">{{ box.nome }}</span>
            <span class="hm-card-oggetti" *ngIf="box.num_oggetti !== undefined && box.num_oggetti !== null">
              {{ box.num_oggetti }} oggett{{ box.num_oggetti === 1 ? 'o' : 'i' }}
            </span>
            <span class="hm-card-full" *ngIf="isBoxPiena(box)">Piena</span>
          </div>
        </div>
      </div>

      <div class="hm-eliminato-msg" *ngIf="messaggioEliminazione">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="9"/>
          <line x1="10" y1="6" x2="10" y2="12"/>
          <line x1="10" y1="14" x2="10.01" y2="14"/>
        </svg>
        <span>{{ messaggioEliminazione }}</span>
      </div>

      <div class="hm-pagination" *ngIf="!caricamento && boxList.length > boxPerPagina">
        <button class="hm-btn-pag" [class.is-hidden]="!haPrecedente" (click)="paginaPrecedente()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span>Indietro</span>
        </button>
        <span class="hm-pag-info">{{ paginaCorrente + 1 }} / {{ totalePagine }}</span>
        <button class="hm-btn-pag" [class.is-hidden]="!haSuccessiva" (click)="paginaSuccessiva()">
          <span>Avanti</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <nav class="dock-nav">
      <button class="dock-btn dock-btn--home" routerLink="/home" aria-label="Home">
        <svg class="dock-icon" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 14l2-2m0 0l8-8 8 8M6 12v10a1 1 0 0 0 1 1h4m6 0a1 1 0 0 0 1-1v-5a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h1"/>
        </svg>
      </button>
      <button class="dock-btn" routerLink="/search" aria-label="Search">
        <svg class="dock-icon" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="13" cy="13" r="8.5"/>
          <line x1="22" y1="22" x2="19.3" y2="19.3"/>
        </svg>
      </button>
      <button class="dock-btn" routerLink="/profilo" aria-label="Profile">
        <svg class="dock-icon" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="14" cy="10" r="4.5"/>
          <path d="M6 24c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
        </svg>
      </button>
    </nav>

  </div>
</ion-content>

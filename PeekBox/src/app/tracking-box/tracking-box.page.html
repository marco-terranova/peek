<ion-content [fullscreen]="true" class="ia-content">
  <div class="ia-stage">

    <button class="ia-back-btn" (click)="tornaIndietro()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      <span>Torna indietro</span>
    </button>

    <ng-container *ngIf="tipoProfilo === 'business'; else personalMsg">

      <section class="about-section">
        <div class="about-bg"></div>
        <div class="about-inner about-inner--rows">
          <div class="about-content-full">
            <div class="ia-tips-card">
              <div class="ia-tips-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
                  <line x1="8" y1="2" x2="8" y2="18"/>
                  <line x1="16" y1="6" x2="16" y2="22"/>
                </svg>
              </div>
              <h2 class="ac-title">Tracking</h2>
              <p class="ac-text ia-pw-text">
                Visualizza tutti i checkpoint registrati dalle tue box. Clicca su un marker per impostare un geofence.
              </p>

              <div *ngIf="isLoading" class="tb-loading">
                <div class="db-spinner"></div>
                <span>Caricamento checkpoint...</span>
              </div>

              <div #mapContainer class="tb-map-container"></div>

              <div class="tb-info" *ngIf="!isLoading">
                <span>{{ allCheckpoints.length }} checkpoint totali</span>
              </div>
            </div>
          </div>
        </div>
      </section>

    </ng-container>

    <ng-template #personalMsg>
      <section class="about-section">
        <div class="about-bg"></div>
        <div class="about-inner about-inner--rows">
          <div class="about-content-full">
            <div class="ia-tips-card">
              <div class="db-business-msg">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <p>Funzionalit&agrave; disponibile solo per account Business</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </ng-template>

  </div>
</ion-content>

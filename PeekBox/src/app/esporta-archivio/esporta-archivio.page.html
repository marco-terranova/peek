<ion-content [fullscreen]="true" class="bg-soft">
  <div class="page-wrapper">

    <button class="ea-back-btn" (click)="navTo('/profilo')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      <span>Torna indietro</span>
    </button>

    <div class="ea-header">
      <h1 class="ea-title">Esporta Archivio</h1>
      <p class="ea-sub">Scarica una copia completa dei tuoi dati PeekBox</p>
    </div>

    <div class="export-plancia-grid">

      <div class="quadrante-esporta-card">
        <div class="panel-header">
          <ion-icon name="filter-circle-outline" class="text-azzurro"></ion-icon>
          <h3>Cosa vuoi esportare?</h3>
        </div>

        <div class="filter-group">

          <label class="radio-option">
            <input type="radio" name="scope" value="tutto" [(ngModel)]="exportScope">
            <span class="custom-radio"></span>
            <div class="option-text">
              <strong>Intero Archivio</strong>
              <span>Tutte le box e tutti gli articoli salvati.</span>
            </div>
          </label>

          <label class="radio-option">
            <input type="radio" name="scope" value="attive" [(ngModel)]="exportScope">
            <span class="custom-radio"></span>
            <div class="option-text">
              <strong>Solo Box Attive</strong>
              <span>Esclude il cestino e i pacchi in transito.</span>
            </div>
          </label>

          <label class="radio-option">
            <input type="radio" name="scope" value="singola" [(ngModel)]="exportScope">
            <span class="custom-radio"></span>
            <div class="option-text">
              <strong>Singola Box</strong>
              <span>Esporta o stampa il contenuto di una sola box.</span>
            </div>
          </label>

          <div class="box-selector-wrapper" *ngIf="exportScope === 'singola'">
            <ion-icon name="cube-outline" class="box-selector-icon"></ion-icon>
            <pb-dropdown
              [options]="elencoBox"
              [(ngModel)]="selectedBoxId"
              valueKey="id"
              labelKey="nome"
              placeholder="Seleziona una box...">
            </pb-dropdown>
          </div>

        </div>
      </div>

      <div class="quadrante-esporta-card">
        <div class="panel-header">
          <ion-icon name="document-text-outline" class="text-verde"></ion-icon>
          <h3>Scegli il formato</h3>
        </div>

        <div class="format-cards-container">

          <div class="format-card"
               [class.active]="exportFormat === 'pdf'"
               (click)="setFormat('pdf')">
            <ion-icon name="document-outline" class="format-icon pdf-color"></ion-icon>
            <strong>PDF</strong>
          </div>

          <div class="format-card"
               [class.active]="exportFormat === 'csv'"
               (click)="setFormat('csv')">
            <ion-icon name="grid-outline" class="format-icon csv-color"></ion-icon>
            <strong>CSV / Excel</strong>
          </div>

          <div class="format-card"
               [class.active]="exportFormat === 'json'"
               (click)="setFormat('json')">
            <ion-icon name="code-slash-outline" class="format-icon json-color"></ion-icon>
            <strong>JSON (Backup)</strong>
          </div>

        </div>
      </div>

    </div>

    <div class="ea-actions">
<button class="ea-btn-genera"
              [disabled]="!isFormValid() || isExporting"
              (click)="generaReport()">
        <ion-icon name="sparkles" *ngIf="!isExporting"></ion-icon>
        <ion-spinner name="crescent" *ngIf="isExporting"></ion-spinner>
        <span>{{ isExporting ? 'Generazione...' : 'Genera Report' }}</span>
      </button>
    </div>

  </div>
</ion-content>

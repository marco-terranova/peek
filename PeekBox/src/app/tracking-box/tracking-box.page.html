<ion-content [fullscreen]="true" class="tb-content">
  <div class="tb-stage">

    <button class="ia-back-btn" (click)="tornaIndietro()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      <span>Torna indietro</span>
    </button>

    <ng-container *ngIf="tipoProfilo === 'business'; else personalMsg">

      <div class="tb-header">
        <h2 class="tb-title">Tracking</h2>
        <p class="tb-subtitle">Tutti i checkpoint delle tue box. Clicca su un marker per impostare un geofence.</p>
        <div class="tb-stats" *ngIf="!isLoading">
          <span class="tb-stat">{{ allCheckpoints.length }} checkpoint</span>
        </div>
      </div>

      <div *ngIf="isLoading" class="tb-loading">
        <div class="db-spinner"></div>
        <span>Caricamento checkpoint...</span>
      </div>

      <div class="tb-map-wrap">
        <div #mapContainer class="tb-map-container"></div>
      </div>

    </ng-container>

    <ng-template #personalMsg>
      <div class="tb-personal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <p>Funzionalit&agrave; disponibile solo per account Business</p>
      </div>
    </ng-template>

  </div>
</ion-content>

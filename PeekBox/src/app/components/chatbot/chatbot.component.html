<button class="chat-fab" (click)="toggleChat()" *ngIf="!showChat">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</button>

<div class="chat-panel" [class.chat-panel--open]="showChat">
  <div class="cph">
    <svg class="cph-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33"/>
      <path d="M4.6 15a1.65 1.65 0 0 1-.33 1.82l-.06.06a2 2 0 0 0 2.83 2.83l.06-.06a1.65 1.65 0 0 1 1.82-.33"/>
      <path d="M12 2v2"/>
      <path d="M18 6l-1.34 1.34"/>
      <path d="M6 6l1.34 1.34"/>
    </svg>
    <div class="cph-info">
      <span class="cph-name">Assistente PeekBox</span>
      <span class="cph-status"><span class="cph-dot"></span> Online</span>
    </div>
    <button class="cph-close" (click)="toggleChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="chat-body" #chatBody>
    <div *ngFor="let msg of chatMessages" class="cm" [class.cm--u]="msg.isUser">
      <div class="cm-avatar">{{ msg.isUser ? '👤' : '🤖' }}</div>
      <div class="cm-bubble">{{ msg.text }}</div>
    </div>
    <div *ngIf="isTyping" class="cm-typing">
      <div class="ctd"></div><div class="ctd"></div><div class="ctd"></div>
    </div>
  </div>

  <div *ngIf="suggestions.length > 0" class="chat-suggestions">
    <button *ngFor="let s of suggestions" class="cs-chip" (click)="sendSuggestion(s)">{{ s }}</button>
  </div>

  <div class="chat-footer">
    <input class="cf-input" #chatInputRef (keydown.enter)="sendMessage(chatInputRef.value); chatInputRef.value = ''" placeholder="Scrivi un messaggio..." [disabled]="isTyping" />
    <button class="cf-send" (click)="sendMessage(chatInputRef.value); chatInputRef.value = ''" [disabled]="isTyping">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<ion-content [fullscreen]="true" class="nf-content">

  <div class="nf-stage">

    <div class="hero-bg">
      <div class="hb-blob hb-blob--1"></div>
      <div class="hb-blob hb-blob--2"></div>
      <div class="hb-blob hb-blob--3"></div>
      <div class="hb-blob hb-blob--4"></div>
    </div>

    <div class="nf-body">

      <div class="glass-card nf-card">
        <div class="card-glare"></div>
        <div class="card-accent"></div>
        <div class="card-pattern"></div>
        <div class="card-bubble card-bubble--1"></div>
        <div class="card-bubble card-bubble--2"></div>
        <div class="card-bubble card-bubble--3"></div>

        <div class="nf-code">404</div>

        <div class="nf-divider"></div>

        <h1 class="nf-title">Pagina non trovata</h1>
        <p class="nf-desc">La pagina che stavi cercando non esiste o è stata spostata.</p>

        <div class="nf-suggestions">
          <p class="nf-suggest-title">Prova con:</p>
          <div class="nf-links">
            <button class="nf-link" (click)="vai('/profilo')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span>Profilo</span>
            </button>
            <button class="nf-link" (click)="vai('/search')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <span>Cerca</span>
            </button>
            <button class="nf-link" (click)="vai('/scan-qr')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
              <span>Scansiona</span>
            </button>
            <button class="nf-link" (click)="vai('/crea-box')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
              <span>Nuova Box</span>
            </button>
          </div>
        </div>

        <button class="btn-home" (click)="vai('/home')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>Torna alla Home</span>
          <span class="btn-shimmer"></span>
        </button>

      </div>

    </div>

  </div>

</ion-content>
